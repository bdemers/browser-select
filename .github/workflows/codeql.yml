name: CodeQL

# Security static analysis (SAST) for Swift. Results appear in the repo's Security tab.
# Free for public repositories; private repos require GitHub Advanced Security.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1" # weekly, Monday 05:23 UTC

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-26
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build (CodeQL autobuild)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
